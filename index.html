<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Notepad</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #f0f4f9;
    }

    .clip-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      border: none;
      width: 1600px;
      height: 100vh;
      /* Dịch trái 270px (sidebar) và lên 129px (toolbar) */
      transform: translate(-270px, -129px);
      transform-origin: top left;
    }

    /* Che phần bên phải sau vùng giấy 816px */
    .cover-right {
      position: fixed;
      top: 0;
      left: 816px;
      width: calc(100vw - 816px);
      height: 100vh;
      background: #f0f4f9;
      z-index: 10;
    }

    /* Che footer dưới */
    .cover-bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 816px;
      height: 52px;
      background: #f0f4f9;
      z-index: 10;
    }

    /* Che mép trên phòng hờ */
    .cover-top {
      position: fixed;
      top: 0;
      left: 0;
      width: 816px;
      height: 4px;
      background: #f0f4f9;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="clip-wrapper">
    <iframe
      src="https://docs.google.com/document/d/1CYirZ0IfiJJthv0IdSNhubInJOyBA2oKGxqNueJjn8k/edit?tab=t.5flhlpkf0qn"
      allowfullscreen
    ></iframe>
  </div>

  <div class="cover-right"></div>
  <div class="cover-bottom"></div>
  <div class="cover-top"></div>
</body>
</html>
